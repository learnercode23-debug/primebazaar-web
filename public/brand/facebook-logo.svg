<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B"/>
      <stop offset="100%" style="stop-color:#4C1D95"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE9FE;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#EDE9FE;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="80" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="500" height="500" rx="80" fill="url(#shine)"/>

  <!-- Decorative circle accent -->
  <circle cx="390" cy="110" r="90" fill="#7C3AED" opacity="0.25"/>
  <circle cx="110" cy="390" r="70" fill="#7C3AED" opacity="0.15"/>

  <!-- "P" letter mark -->
  <text x="250" y="300"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="260"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="-8">P</text>

  <!-- Orange dot accent -->
  <circle cx="330" cy="155" r="22" fill="#F97316"/>

  <!-- Brand name below -->
  <text x="250" y="430"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="42"
    font-weight="700"
    fill="#C4B5FD"
    text-anchor="middle"
    letter-spacing="2">PRIMEPASAL</text>
</svg>
