<svg xmlns="http://www.w3.org/2000/svg" width="820" height="312" viewBox="0 0 820 312">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B"/>
      <stop offset="60%" style="stop-color:#4C1D95"/>
      <stop offset="100%" style="stop-color:#6D28D9"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="820" height="312" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="720" cy="-20" r="180" fill="#7C3AED" opacity="0.3"/>
  <circle cx="750" cy="340" r="130" fill="#4C1D95" opacity="0.4"/>
  <circle cx="-30" cy="280" r="120" fill="#6D28D9" opacity="0.2"/>
  <circle cx="100" cy="-40" r="100" fill="#7C3AED" opacity="0.15"/>

  <!-- Floating product cards (decorative) -->
  <rect x="530" y="48" width="110" height="140" rx="14" fill="url(#cardBg)" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <rect x="660" y="70" width="110" height="140" rx="14" fill="url(#cardBg)" stroke="white" stroke-opacity="0.12" stroke-width="1"/>
  <rect x="595" y="30" width="110" height="140" rx="14" fill="url(#cardBg)" stroke="white" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Card icons -->
  <text x="585" y="115" font-size="36" text-anchor="middle">📱</text>
  <text x="715" y="138" font-size="36" text-anchor="middle">💻</text>
  <text x="650" y="95" font-size="36" text-anchor="middle">👟</text>

  <!-- Left content -->
  <!-- Logo text -->
  <text x="60" y="118"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="72"
    font-weight="900"
    fill="white"
    letter-spacing="-2">primepasal</text>
  <!-- Orange dot -->
  <circle cx="484" cy="97" r="9" fill="#F97316"/>

  <!-- Tagline -->
  <text x="60" y="162"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="400"
    fill="#C4B5FD"
    letter-spacing="0.5">Nepal's Online Shopping Destination</text>

  <!-- Divider line -->
  <rect x="60" y="185" width="50" height="3" rx="2" fill="#F97316"/>

  <!-- Feature pills -->
  <rect x="60" y="210" width="130" height="34" rx="17" fill="#7C3AED" opacity="0.6"/>
  <text x="125" y="232" font-family="sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">Free Delivery</text>

  <rect x="202" y="210" width="120" height="34" rx="17" fill="#7C3AED" opacity="0.6"/>
  <text x="262" y="232" font-family="sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">eSewa / Khalti</text>

  <rect x="334" y="210" width="120" height="34" rx="17" fill="#7C3AED" opacity="0.6"/>
  <text x="394" y="232" font-family="sans-serif" font-size="13" font-weight="600" fill="white" text-anchor="middle">30-Day Returns</text>

  <!-- Website URL -->
  <text x="60" y="284"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="16"
    font-weight="500"
    fill="#A78BFA"
    letter-spacing="1">www.primepasal.com</text>
</svg>
