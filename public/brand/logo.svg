<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 165" width="580" height="165">
  <defs>
    <linearGradient id="bagGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1030AA"/>
      <stop offset="60%"  stop-color="#1A50C8"/>
      <stop offset="100%" stop-color="#2265D8"/>
    </linearGradient>
    <linearGradient id="swooshGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#CC5000"/>
      <stop offset="100%" stop-color="#F07818"/>
    </linearGradient>
    <clipPath id="bagClip">
      <path d="M 10,60 L 10,152 Q 10,164 22,164 L 114,164 Q 126,164 126,152 L 126,60 Z"/>
    </clipPath>
    <filter id="dropshadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- ════════════════════════════
       BAG HANDLE (thick rounded ring)
  ════════════════════════════ -->
  <path d="M 30,66 C 30,8 106,8 106,66"
    fill="none" stroke="#1640CC" stroke-width="20" stroke-linecap="round"
    filter="url(#dropshadow)"/>
  <path d="M 38,66 C 38,26 98,26 98,66"
    fill="none" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.65"/>

  <!-- ════════════════════════════
       BAG BODY
  ════════════════════════════ -->
  <path d="M 10,60 L 10,152 Q 10,164 22,164 L 114,164 Q 126,164 126,152 L 126,60 Z"
    fill="url(#bagGrad)" filter="url(#dropshadow)"/>

  <!-- Left shadow (3D depth) -->
  <rect x="10" y="60" width="20" height="104" fill="black" opacity="0.20" rx="3"/>

  <!-- ════════════════════════════
       ORANGE SWOOSH
  ════════════════════════════ -->
  <path d="M 42,164 Q 82,130 126,134 L 126,164 Z"
    fill="url(#swooshGrad)" clip-path="url(#bagClip)"/>

  <!-- ════════════════════════════
       DOUBLE-P LETTER
       Uses evenodd fill so inner holes
       are transparent (bag shows through)
  ════════════════════════════ -->
  <path fill="white" fill-rule="evenodd" d="
    M 24,72
    L 24,156
    L 40,156
    L 40,150
    L 60,150
    Q 80,150 80,132
    Q 80,116 60,116
    L 40,116
    L 40,110
    L 62,110
    Q 90,110 90,91
    Q 90,72 62,72
    Z

    M 40,86 L 58,86 Q 76,86 76,91 Q 76,96 58,96 L 40,96 Z

    M 40,122 L 56,122 Q 68,122 68,130 Q 68,138 56,138 L 40,138 Z
  "/>

  <!-- ════════════════════════════
       TEXT
  ════════════════════════════ -->
  <text x="146" y="124"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-size="75" font-weight="900" letter-spacing="-1"
    fill="#1030AA">Prime</text>

  <text x="358" y="124"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-size="75" font-weight="900" letter-spacing="-1"
    fill="#E87018">Pasal</text>

</svg>
