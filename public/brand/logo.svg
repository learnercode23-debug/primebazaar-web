<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 165">
  <defs>
    <linearGradient id="bagG" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1232B0"/>
      <stop offset="100%" stop-color="#1D58DC"/>
    </linearGradient>
    <linearGradient id="orgG" x1="0" y1="1" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#C84800"/>
      <stop offset="100%" stop-color="#F07818"/>
    </linearGradient>
    <linearGradient id="hndG" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse"
      y1="14" y2="70">
      <stop offset="0%"   stop-color="#1848D0"/>
      <stop offset="100%" stop-color="#0B20A0"/>
    </linearGradient>
    <clipPath id="bagClip">
      <path d="M 10,68 L 138,68 L 138,154 Q 138,164 128,164 L 20,164 Q 10,164 10,154 Z"/>
    </clipPath>
  </defs>

  <!-- ══════════════════════════════
       LEFT HANDLE RING (drawn behind bag)
  ══════════════════════════════ -->
  <ellipse cx="46" cy="41" rx="20" ry="27"
    fill="none" stroke="url(#hndG)" stroke-width="16"/>
  <ellipse cx="46" cy="41" rx="10" ry="17"
    fill="none" stroke="#6090F0" stroke-width="4" opacity="0.45"/>

  <!-- RIGHT HANDLE RING -->
  <ellipse cx="102" cy="41" rx="20" ry="27"
    fill="none" stroke="url(#hndG)" stroke-width="16"/>
  <ellipse cx="102" cy="41" rx="10" ry="17"
    fill="none" stroke="#6090F0" stroke-width="4" opacity="0.45"/>

  <!-- ══════════════════════════════
       BAG BODY (overlaps handle bottoms)
  ══════════════════════════════ -->
  <path d="M 10,68 L 138,68 L 138,154 Q 138,164 128,164 L 20,164 Q 10,164 10,154 Z"
    fill="url(#bagG)"/>

  <!-- Dark left edge (3-D shadow) -->
  <path d="M 10,68 L 28,68 L 28,164 L 20,164 Q 10,164 10,154 Z"
    fill="#081890" opacity="0.65"/>

  <!-- ══════════════════════════════
       LARGE ORANGE SECTION (bottom-right ~35 % of bag)
  ══════════════════════════════ -->
  <path d="M 46,164 Q 88,116 138,120 L 138,154 Q 138,164 128,164 Z"
    fill="url(#orgG)" clip-path="url(#bagClip)"/>

  <!-- ══════════════════════════════
       GROMMET DOTS at handle/bag junction
  ══════════════════════════════ -->
  <circle cx="29"  cy="70" r="5" fill="white" opacity="0.92"/>
  <circle cx="63"  cy="70" r="5" fill="white" opacity="0.92"/>
  <circle cx="85"  cy="70" r="5" fill="white" opacity="0.92"/>
  <circle cx="119" cy="70" r="5" fill="white" opacity="0.92"/>

  <!-- ══════════════════════════════
       DOUBLE-P  (fill-rule evenodd: outer boundary + two inner holes)
  ══════════════════════════════ -->
  <path fill="white" fill-rule="evenodd" d="
    M 30,80
    L 68,80
    Q 108,80 108,99
    Q 108,118 68,118
    L 44,118
    L 44,124
    L 62,124
    Q 90,124 90,138
    Q 90,152 62,152
    L 44,152
    L 44,160
    L 30,160
    Z

    M 44,91  L 63,91  Q 94,91  94,99  Q 94,107 63,107 L 44,107 Z

    M 44,130 L 58,130 Q 78,130 78,138 Q 78,146 58,146 L 44,146 Z
  "/>

  <!-- ══════════════════════════════
       TEXT
  ══════════════════════════════ -->
  <text x="158" y="122"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-size="72" font-weight="900" letter-spacing="-1"
    fill="#1232B0">Prime</text>

  <text x="366" y="122"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-size="72" font-weight="900" letter-spacing="-1"
    fill="#E87018">Pasal</text>
</svg>
